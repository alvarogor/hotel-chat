<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel de Administración — Recepcionista Virtual</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, Arial, sans-serif;
    background: #faf3f0;
    color: #4a3838;
    padding: 24px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  header h1 { font-size: 22px; margin-bottom: 4px; }
  header p { color: #8a7068; font-size: 14px; }

  .lock-screen {
    background: white;
    border-radius: 14px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(150,90,90,0.08);
  }
  .lock-screen input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #f0ddd6;
    border-radius: 10px;
    font-size: 15px;
    margin: 16px 0;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(150,90,90,0.06);
  }
  .card h2 { font-size: 15px; margin-bottom: 14px; color: #c98a8a; text-transform: uppercase; letter-spacing: 0.5px; }

  label { display: block; font-size: 13px; color: #6b5650; margin-bottom: 5px; margin-top: 12px; font-weight: 600; }
  label:first-of-type { margin-top: 0; }
  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #f0ddd6;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: #4a3838;
    background: #fffaf8;
  }
  input:focus, textarea:focus { outline: none; border-color: #e0a8a0; }
  textarea { resize: vertical; min-height: 60px; }

  .service-row { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; margin-top: 10px; padding: 12px; background: #fffaf8; border-radius: 8px; }
  .service-row textarea { grid-column: 1 / -1; margin-top: 8px; }
  .service-row .remove { grid-column: 1 / -1; text-align: right; }
  .remove-btn { background: none; border: none; color: #c0392b; font-size: 12px; cursor: pointer; }

  .add-btn {
    margin-top: 10px;
    background: #fffaf8;
    border: 1.5px dashed #e0a8a0;
    color: #b07268;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
  }

  .save-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #c98a8a, #e0a8a0);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .save-btn:hover { opacity: 0.9; }

  .status-msg {
    text-align: center;
    padding: 12px;
    border-radius: 8px;
    margin-top: 12px;
    font-size: 14px;
    display: none;
  }
  .status-msg.success { background: #e6f4ea; color: #1e7e34; display: block; }
  .status-msg.error { background: #fdeded; color: #c0392b; display: block; }

  .preview-link {
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    color: #c98a8a;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚙️ Panel de Administración</h1>
    <p>Personaliza tu recepcionista virtual sin tocar código</p>
  </header>

  <div id="lockScreen" class="lock-screen">
    <h2 style="margin-bottom: 8px;">🔒 Acceso privado</h2>
    <p style="color: #8a7068; font-size: 14px;">Introduce la contraseña de administrador</p>
    <input type="password" id="passwordInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter') unlock()" />
    <button class="save-btn" onclick="unlock()">Entrar</button>
    <p id="lockError" style="color:#c0392b; font-size:13px; margin-top:10px;"></p>
  </div>

  <div id="panel" style="display:none;">
    <div class="card">
      <h2>Información general</h2>
      <label>Nombre del negocio</label>
      <input id="businessName" placeholder="Centro de Estética Bella" />

      <label>Nombre de la asistente</label>
      <input id="assistantName" placeholder="Sofia" />

      <label>Dirección</label>
      <input id="address" placeholder="Calle Falsa 123, Valencia" />

      <label>Teléfono</label>
      <input id="phone" placeholder="+34 96 123 45 67" />

      <label>Email</label>
      <input id="email" placeholder="info@negocio.com" />

      <label>Horario de apertura</label>
      <input id="openingHours" placeholder="Lunes a Viernes 9:30 - 20:00" />

      <label>Email para recibir notificaciones de reservas</label>
      <input id="notificationEmail" placeholder="tu-email@ejemplo.com" />
    </div>

    <div class="card">
      <h2>Servicios y precios</h2>
      <div id="servicesContainer"></div>
      <button class="add-btn" onclick="addService()">+ Añadir servicio</button>
    </div>

    <div class="card">
      <h2>Comodidades del local</h2>
      <label>Describe las comodidades</label>
      <textarea id="amenities" placeholder="Zona de espera con café, parking cercano, cabinas privadas..."></textarea>
    </div>

    <div class="card">
      <h2>Promociones actuales</h2>
      <textarea id="promotions" placeholder="10% de descuento primera visita, bono de 6 sesiones..."></textarea>
    </div>

    <div class="card">
      <h2>Política de cancelación y pago</h2>
      <textarea id="policies" placeholder="Cancelación gratuita hasta 24h antes, depósito requerido..."></textarea>
    </div>

    <button class="save-btn" onclick="saveConfig()">💾 Guardar cambios</button>
    <div id="statusMsg" class="status-msg"></div>
    <div style="text-align:center;">
      <a href="/index.html" target="_blank" class="preview-link">→ Ver el chat en vivo</a>
    </div>
  </div>
</div>

<script>
  let adminPassword = '';
  let services = [];

  async function unlock() {
    const pw = document.getElementById('passwordInput').value;
    try {
      const res = await fetch('/api/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      if (res.ok) {
        adminPassword = pw;
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('panel').style.display = 'block';
      } else {
        document.getElementById('lockError').textContent = 'Contraseña incorrecta';
      }
    } catch (err) {
      document.getElementById('lockError').textContent = 'Error de conexión';
    }
  }

  async function loadConfig() {
    try {
      const res = await fetch('/api/config');
      const config = await res.json();

      document.getElementById('businessName').value = config.businessName || '';
      document.getElementById('assistantName').value = config.assistantName || '';
      document.getElementById('address').value = config.address || '';
      document.getElementById('phone').value = config.phone || '';
      document.getElementById('email').value = config.email || '';
      document.getElementById('openingHours').value = config.openingHours || '';
      document.getElementById('notificationEmail').value = config.notificationEmail || '';
      document.getElementById('amenities').value = config.amenities || '';
      document.getElementById('promotions').value = config.promotions || '';
      document.getElementById('policies').value = config.policies || '';

      services = config.services || [];
      renderServices();
    } catch (err) {
      console.error('Error loading config', err);
    }
  }

  function renderServices() {
    const container = document.getElementById('servicesContainer');
    container.innerHTML = services.map((s, i) => `
      <div class="service-row">
        <input value="${s.name || ''}" placeholder="Nombre del servicio" oninput="services[${i}].name = this.value" />
        <input value="${s.price || ''}" placeholder="Precio €" oninput="services[${i}].price = this.value" />
        <textarea placeholder="Descripción" oninput="services[${i}].description = this.value">${s.description || ''}</textarea>
        <div class="remove"><button class="remove-btn" onclick="removeService(${i})">Eliminar</button></div>
      </div>
    `).join('');
  }

  function addService() {
    services.push({ name: '', price: '', description: '' });
    renderServices();
  }

  function removeService(i) {
    services.splice(i, 1);
    renderServices();
  }

  async function saveConfig() {
    const payload = {
      password: adminPassword,
      businessName: document.getElementById('businessName').value,
      assistantName: document.getElementById('assistantName').value,
      address: document.getElementById('address').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      openingHours: document.getElementById('openingHours').value,
      notificationEmail: document.getElementById('notificationEmail').value,
      amenities: document.getElementById('amenities').value,
      promotions: document.getElementById('promotions').value,
      policies: document.getElementById('policies').value,
      services: services
    };

    const statusEl = document.getElementById('statusMsg');

    try {
      const res = await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        statusEl.className = 'status-msg success';
        statusEl.textContent = '✅ Guardado correctamente';
      } else {
        const data = await res.json();
        statusEl.className = 'status-msg error';
        statusEl.textContent = '❌ ' + (data.error || 'Error al guardar');
      }
    } catch (err) {
      statusEl.className = 'status-msg error';
      statusEl.textContent = '❌ Error de conexión';
    }
  }

  loadConfig();
</script>
</body>
</html>
