<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Mirador Barcelona — AI Concierge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1208;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(139, 90, 43, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.1) 0%, transparent 40%);
    }

    .container {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      background: #faf8f3;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1208 0%, #2d1f0e 100%);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    }

    .hotel-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #d4af37, #f0d060);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .hotel-info h1 {
      color: #d4af37;
      font-size: 16px;
      font-weight: normal;
      letter-spacing: 1px;
    }

    .hotel-info p {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-family: 'Arial', sans-serif;
      margin-top: 2px;
    }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      font-family: Arial, sans-serif;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #faf8f3;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 2px; }

    .message {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.assistant .avatar {
      background: linear-gradient(135deg, #d4af37, #f0d060);
    }

    .message.user .avatar {
      background: #2d1f0e;
      color: #d4af37;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      font-family: Arial, sans-serif;
    }

    .message.assistant .bubble {
      background: white;
      color: #2d1f0e;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #2d1f0e, #1a1208);
      color: #f5e6c8;
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .typing .bubble {
      padding: 14px 18px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #d4af37;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Quick replies */
    .quick-replies {
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-reply {
      background: white;
      border: 1px solid #d4af37;
      color: #2d1f0e;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-reply:hover {
      background: #d4af37;
      color: white;
    }

    /* Input area */
    .input-area {
      padding: 16px 20px;
      background: white;
      border-top: 1px solid #ede8dc;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      border: 1.5px solid #ede8dc;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      color: #2d1f0e;
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.5;
      transition: border-color 0.2s;
      background: #faf8f3;
    }

    .input-area textarea:focus { border-color: #d4af37; }
    .input-area textarea::placeholder { color: #b0a080; }

    .send-btn {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #d4af37, #f0d060);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 18px; height: 18px; fill: #1a1208; }

    /* Welcome card */
    .welcome-card {
      background: linear-gradient(135deg, #2d1f0e, #1a1208);
      border-radius: 16px;
      padding: 20px;
      color: #f5e6c8;
      margin-bottom: 4px;
    }

    .welcome-card h2 {
      color: #d4af37;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .welcome-card p {
      font-size: 13px;
      font-family: Arial, sans-serif;
      color: rgba(245, 230, 200, 0.7);
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="hotel-logo">🏨</div>
    <div class="hotel-info">
      <h1>HOTEL MIRADOR</h1>
      <p>Barcelona · Gothic Quarter</p>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      Sofia, AI Concierge
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="message assistant">
      <div class="avatar">✨</div>
      <div>
        <div class="welcome-card">
          <h2>Bienvenido / Welcome</h2>
          <p>I'm Sofia, your personal AI concierge at Hotel Mirador Barcelona. I'm here 24/7 to help with reservations, local tips, and anything you need for a perfect stay. ¿En qué puedo ayudarte? 🌟</p>
        </div>
      </div>
    </div>
  </div>

  <div class="quick-replies" id="quickReplies">
    <button class="quick-reply" onclick="sendQuick('I\'d like to make a reservation')">🛏️ Book a room</button>
    <button class="quick-reply" onclick="sendQuick('What are your room prices?')">💶 Prices</button>
    <button class="quick-reply" onclick="sendQuick('What amenities do you have?')">🏊 Amenities</button>
    <button class="quick-reply" onclick="sendQuick('Can you recommend restaurants nearby?')">🍽️ Restaurants</button>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask Sofia anything..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:3001/api/chat';
  let conversationHistory = [];

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendQuick(text) {
    document.getElementById('input').value = text;
    document.getElementById('quickReplies').style.display = 'none';
    sendMessage();
  }

  function addMessage(role, content) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'assistant' ? '✨' : '👤'}</div>
      <div class="bubble">${content.replace(/\n/g, '<br>')}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant typing';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">✨</div>
      <div class="bubble">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('quickReplies').style.display = 'none';

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        addMessage('assistant', data.reply);
        conversationHistory.push({ role: 'assistant', content: data.reply });
      } else {
        addMessage('assistant', 'I apologize, I\'m having technical difficulties. Please call us at +34 93 123 45 67 🙏');
      }
    } catch (err) {
      removeTyping();
      addMessage('assistant', 'I apologize, I\'m having trouble connecting. Please try again or call us directly at +34 93 123 45 67 📞');
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('input').focus();
  }
</script>
</body>
</html>
