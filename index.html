<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centro de Estética — Recepcionista Virtual</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #faf3f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(ellipse at 20% 30%, rgba(212, 165, 165, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(230, 198, 188, 0.2) 0%, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      background: #fffaf8;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(150, 90, 90, 0.25);
    }

    .header {
      background: linear-gradient(135deg, #c98a8a 0%, #e0a8a0 100%);
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .biz-info h1 {
      color: white;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .biz-info p {
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      margin-top: 2px;
    }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.85);
      font-size: 11px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #fffaf8;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #e0a8a0; border-radius: 2px; }

    .message {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.assistant .avatar {
      background: linear-gradient(135deg, #c98a8a, #e0a8a0);
    }

    .message.user .avatar {
      background: #f3e3df;
      color: #c98a8a;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.assistant .bubble {
      background: white;
      color: #4a3838;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 10px rgba(150, 90, 90, 0.08);
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #c98a8a, #d99a93);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .typing .bubble { padding: 14px 18px; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 6px; height: 6px;
      background: #e0a8a0;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .quick-replies {
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-reply {
      background: white;
      border: 1px solid #e8c5be;
      color: #4a3838;
      padding: 7px 13px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-reply:hover {
      background: #e0a8a0;
      color: white;
      border-color: #e0a8a0;
    }

    .input-area {
      padding: 16px 20px;
      background: white;
      border-top: 1px solid #f5e5e0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      border: 1.5px solid #f0ddd6;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      color: #4a3838;
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.5;
      transition: border-color 0.2s;
      background: #fffaf8;
      font-family: inherit;
    }

    .input-area textarea:focus { border-color: #e0a8a0; }
    .input-area textarea::placeholder { color: #c4a8a0; }

    .send-btn {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #c98a8a, #e0a8a0);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    .welcome-card {
      background: linear-gradient(135deg, #c98a8a, #e0a8a0);
      border-radius: 16px;
      padding: 20px;
      color: white;
      margin-bottom: 4px;
    }

    .welcome-card h2 {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .welcome-card p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">💆‍♀️</div>
    <div class="biz-info">
      <h1 id="bizNameHeader">CENTRO DE ESTÉTICA BELLA</h1>
      <p id="bizAddressHeader">Valencia</p>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      <span id="assistantNameHeader">Sofia</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="message assistant">
      <div class="avatar">✨</div>
      <div>
        <div class="welcome-card">
          <h2>¡Hola! 👋</h2>
          <p>Soy Sofia, tu recepcionista virtual. Estoy aquí 24/7 para ayudarte a reservar tu cita, resolver dudas sobre tratamientos o precios. ¿En qué puedo ayudarte?</p>
        </div>
      </div>
    </div>
  </div>

  <div class="quick-replies" id="quickReplies">
    <button class="quick-reply" onclick="sendQuick('Quiero reservar una cita')">📅 Reservar cita</button>
    <button class="quick-reply" onclick="sendQuick('¿Qué tratamientos ofrecéis y cuánto cuestan?')">💶 Precios</button>
    <button class="quick-reply" onclick="sendQuick('¿Cuál es vuestro horario?')">🕐 Horario</button>
    <button class="quick-reply" onclick="sendQuick('¿Tenéis alguna promoción?')">🎁 Promociones</button>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Escribe tu mensaje..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_URL = '/api/chat';
  let conversationHistory = [];

  async function loadBusinessConfig() {
    try {
      const res = await fetch('/api/config');
      const config = await res.json();
      if (config.businessName) {
        document.getElementById('bizNameHeader').textContent = config.businessName.toUpperCase();
      }
      if (config.address) {
        document.getElementById('bizAddressHeader').textContent = config.address;
      }
      if (config.assistantName) {
        document.getElementById('assistantNameHeader').textContent = config.assistantName;
      }
    } catch (err) {
      console.error('Could not load business config', err);
    }
  }
  loadBusinessConfig();

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendQuick(text) {
    document.getElementById('input').value = text;
    document.getElementById('quickReplies').style.display = 'none';
    sendMessage();
  }

  function addMessage(role, content) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'assistant' ? '✨' : '👤'}</div>
      <div class="bubble">${content.replace(/\n/g, '<br>')}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant typing';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">✨</div>
      <div class="bubble">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('quickReplies').style.display = 'none';

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        addMessage('assistant', data.reply);
        conversationHistory.push({ role: 'assistant', content: data.reply });
      } else {
        addMessage('assistant', 'Disculpa, estoy teniendo problemas técnicos. Por favor, llámanos directamente 🙏');
      }
    } catch (err) {
      removeTyping();
      addMessage('assistant', 'Disculpa, no puedo conectarme ahora mismo. Inténtalo de nuevo en un momento 📞');
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('input').focus();
  }
</script>
</body>
</html>
